# ============================================================================
# GitHub Actions CI/CD для BankApp (iOS)
# ============================================================================
# Workflow автоматизирует сборку и тестирование iOS-приложения.
#
# Триггеры:
#   - push: в любую ветку
#   - pull_request: в ветки develop и main
#   - workflow_dispatch: ручной запуск с параметрами
#
# Основано на:
#   - https://sarunw.com/posts/github-actions-for-ios-projects/
#   - https://medium.com/thefork/ios-ci-cd-with-github-actions-e4504228c9d
#   - https://github.com/Apple-Actions/Example-iOS
# ============================================================================

name: iOS CI/CD

run-name: "Build BankApp (${{ github.ref_name }})"

# --- Триггеры ---------------------------------------------------------------
on:
  # Запуск на push в любую ветку
  push:
    branches:
      - "main"
      - "develop"
      - "feature/**"
      - "release/**"
      - "hotfix/**"
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "README*"

  # Запуск на pull request в основные ветки
  pull_request:
    branches:
      - "main"
      - "develop"
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "README*"

  # Ручной запуск (workflow_dispatch)
  workflow_dispatch:
    inputs:
      xcode_version:
        description: "Версия Xcode"
        required: false
        default: "latest-stable"
        type: choice
        options:
          - "latest-stable"
          - "16.2"
          - "16.1"
          - "16.0"
          - "15.4"
      build_type:
        description: "Тип сборки"
        required: true
        default: "simulator"
        type: choice
        options:
          - "simulator"
          - "device"
      deploy_to_testflight:
        description: "Загрузить в TestFlight"
        required: false
        default: false
        type: boolean

# --- Управление параллельностью ---------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# --- Переменные --------------------------------------------------------------
env:
  PROJECT_NAME: BankApp
  SCHEME_NAME: BankApp
  BUNDLE_ID: com.example.bankapp
  IPHONE_SIMULATOR: "iPhone 16"
  # Для выбора версии Xcode через DEVELOPER_DIR (опционально)
  # DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

# --- Jobs --------------------------------------------------------------------
jobs:

  # ==========================================================================
  # Job 1: Build & Test (Simulator)
  # ==========================================================================
  # Цель: быстрая проверка — компиляция и юнит-тесты на iOS Simulator.
  # Запускается: на push/PR во всех ветках, кроме prod.
  #
  # Вдохновлено:
  #   - Sarunw: strategy/matrix для тестирования на разных версиях
  #   - TheFork: cancel-workflow-action для отмены предыдущих запусков
  #   - Apple-Actions: setup-xcode, xcodebuild action
  # ==========================================================================
  build_and_test:
    name: Build & Test on Simulator
    # macOS runner ( Sonoma / latest )
    # https://github.com/actions/runner-images/blob/main/images/macos/macos-14-Readme.md
    runs-on: macos-14
    timeout-minutes: 25

    strategy:
      matrix:
        xcode: ["16.2", "16.1"]
        ios_version: ["18.2", "18.1"]
      fail-fast: false

    steps:
      # --- 1. Отмена предыдущих запусков (TheFork подход) ---
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      # --- 2. Checkout кода ---
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- 3. Настройка Xcode (Sarunw + Apple-Actions подход) ---
      # Используем maxim-lobanov/setup-xcode для выбора версии
      - name: Setup Xcode ${{ matrix.xcode }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      # --- 4. Кэширование DerivedData ---
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-data-${{ matrix.xcode }}-${{ hashFiles('**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-${{ matrix.xcode }}-
            ${{ runner.os }}-derived-data-

      # --- 5. Проверка окружения ---
      - name: Print Environment Info
        run: |
          echo "=== Xcode Version ==="
          xcodebuild -version
          echo ""
          echo "=== Available Simulators ==="
          xcrun simctl list devices available
          echo ""
          echo "=== Swift Version ==="
          swift --version
          echo ""
          echo "=== macOS Version ==="
          sw_vers

      # --- 6. Сборка проекта для симулятора ---
      # Для проекта БЕЗ workspace (просто .xcodeproj)
      - name: Build Project (Simulator)
        run: |
          xcodebuild clean build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME_NAME }} \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${{ env.IPHONE_SIMULATOR }},OS=${{ matrix.ios_version }}" \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            | xcbeautify --renderer github-actions

      # --- 7. Запуск тестов (если есть тестовая схема) ---
      - name: Run Tests
        continue-on-error: true
        run: |
          xcodebuild test \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME_NAME }} \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${{ env.IPHONE_SIMULATOR }},OS=${{ matrix.ios_version }}" \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            | xcbeautify --renderer github-actions

      # --- 8. Сборка результатов тестов (Sarunw подход) ---
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-xcode${{ matrix.xcode }}-ios${{ matrix.ios_version }}
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/*.xcresult
            ~/Library/Developer/Xcode/DerivedData/**/Logs/**/*.log
          if-no-files-found: ignore

  # ==========================================================================
  # Job 2: Build for Device (Archive + Export)
  # ==========================================================================
  # Цель: сборка .ipa для физического устройства с кодовой подписью.
  # Запускается: только на ветке main при push или при ручном запуске.
  #
  # Вдохновлено:
  #   - Apple-Actions: import-codesign-certs, download-provisioning-profiles
  #   - TheFork: workflow_dispatch с параметрами
  # ==========================================================================
  build_archive:
    name: Archive for Device
    runs-on: macos-14
    timeout-minutes: 30
    needs: build_and_test

    # Условие: запуск только на main или при ручном запуске с build_type=device
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'device')

    steps:
      # --- 1. Checkout ---
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- 2. Настройка Xcode ---
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ github.event.inputs.xcode_version || '16.2' }}

      # --- 3. Импорт сертификатов подписи (Apple-Actions) ---
      # Требует наличия секретов в репозитории:
      #   IOS_CERTIFICATE_BASE64 — base64-encoded .p12
      #   IOS_CERTIFICATE_PASSWORD — пароль к .p12
      - name: Import Code Signing Certificates
        uses: Apple-Actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        env:
          # Пропускаем если секреты не настроены (для демо)
          P12_SKIP: ${{ secrets.IOS_CERTIFICATE_BASE64 == '' }}

      # --- 4. Загрузка Provisioning Profile (Apple-Actions) ---
      - name: Download Provisioning Profiles
        uses: Apple-Actions/download-provisioning-profiles@v3
        with:
          bundle-id: ${{ env.BUNDLE_ID }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        env:
          # Пропускаем если секреты не настроены
          PROFILE_SKIP: ${{ secrets.APPSTORE_ISSUER_ID == '' }}

      # --- 5. Сборка и архивирование ---
      - name: Archive Project
        run: |
          mkdir -p build/Archives
          xcodebuild clean archive \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME_NAME }} \
            -sdk iphoneos \
            -archivePath build/Archives/${{ env.PROJECT_NAME }}.xcarchive \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            MARKETING_VERSION=1.0.${{ github.run_number }} \
            | xcbeautify --renderer github-actions

      # --- 6. Экспорт .ipa ---
      - name: Export IPA
        run: |
          if [ -f "ExportOptions.plist" ]; then
            xcodebuild -exportArchive \
              -archivePath build/Archives/${{ env.PROJECT_NAME }}.xcarchive \
              -exportPath build/Artifacts \
              -exportOptionsPlist ExportOptions.plist \
              | xcbeautify --renderer github-actions
          else
            echo "⚠️ ExportOptions.plist не найден — пропускаем экспорт"
            mkdir -p build/Artifacts
            echo "Для экспорта .ipa создайте ExportOptions.plist" > build/Artifacts/README.txt
          fi

      # --- 7. Загрузка артефактов ---
      - name: Upload Archive
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: BankApp-archive-${{ github.run_number }}
          path: |
            build/Archives/${{ env.PROJECT_NAME }}.xcarchive
            build/Artifacts/
          if-no-files-found: warn

      # --- 8. Загрузка логов при ошибке (Apple-Actions подход) ---
      - name: Upload Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure() || cancelled()
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/**/*.log
            build/*.log
          if-no-files-found: ignore

  # ==========================================================================
  # Job 3: Deploy to TestFlight
  # ==========================================================================
  # Цель: загрузка собранного .ipa в TestFlight через App Store Connect API.
  # Запускается: только при ручном запуске с deploy_to_testflight=true.
  #
  # Вдохновлено:
  #   - Apple-Actions: upload-testflight-build action
  # ==========================================================================
  deploy_testflight:
    name: Deploy to TestFlight
    runs-on: macos-14
    timeout-minutes: 20
    needs: build_archive

    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_to_testflight == 'true'

    steps:
      - name: Download Archive Artifact
        uses: actions/download-artifact@v4
        with:
          name: BankApp-archive-${{ github.run_number }}
          path: build/

      - name: Upload to TestFlight
        uses: Apple-Actions/upload-testflight-build@v2
        with:
          app-path: "build/Artifacts/${{ env.PROJECT_NAME }}.ipa"
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
